version: 2

models:
  - name: mart_sales
    columns:
      - name: year
        data_tests: [not_null]
      - name: month
        data_tests: [not_null]
      - name: product_category_name
        data_tests: [not_null]
      - name: customer_state
        data_tests: [not_null]
      - name: gross_merchandise_value
        data_tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: total_freight_value
        data_tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: total_item_revenue
        data_tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: freight_to_gmv_pct
        data_tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"

  - name: mart_logistics
    columns:
      - name: year
        data_tests: [not_null]
      - name: month
        data_tests: [not_null]
      - name: customer_state
        data_tests: [not_null]
      - name: order_status
        data_tests: [not_null]
      - name: late_rate_pct
        data_tests:
          - dbt_utils.expression_is_true:
              expression: "BETWEEN 0 AND 100"

  - name: mart_customer_satisfaction
    columns:
      - name: year
        data_tests: [not_null]
      - name: month
        data_tests: [not_null]
      - name: customer_state
        data_tests: [not_null]
      - name: is_late
        data_tests: [not_null]
      - name: low_review_rate_pct
        data_tests:
          - dbt_utils.expression_is_true:
              expression: "BETWEEN 0 AND 100"
      - name: high_review_rate_pct
        data_tests:
          - dbt_utils.expression_is_true:
              expression: "BETWEEN 0 AND 100"
      - name: comment_message_rate_pct
        data_tests:
