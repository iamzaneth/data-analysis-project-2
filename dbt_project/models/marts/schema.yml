      - name: month
        data_tests: [not_null]
      - name: seller_id
        data_tests: [not_null]
      - name: product_category_name
        data_tests: [not_null]
      - name: low_review_rate_pct
        data_tests:
          - dbt_utils.expression_is_true:
              expression: "BETWEEN 0 AND 100"
      - name: late_rate_pct
        data_tests:
          - dbt_utils.expression_is_true:
              expression: "BETWEEN 0 AND 100"

